<!DOCTYPE html>
<html lang="en">
  <head>
    <title>SPORTSTRACK LIVE</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="description" content="Live match stream player" />
    <meta name="author" content="SportsTrack" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    
    <!-- Anti-DevTools & Protection -->
    <script disable-devtool-auto src="https://cdn.jsdelivr.net/npm/disable-devtool@latest" disable-menu="true" clear-log="true"></script>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- Dependencies -->
    <link rel="preconnect" href="https://cdn.plyr.io" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Keyboard/Right-click Protection -->
    <script>
      document.addEventListener("contextmenu", e => e.preventDefault(), false);
      document.addEventListener("keydown", e => {
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) e.preventDefault();
        if (e.ctrlKey && e.keyCode === 85) e.preventDefault();
        if (e.keyCode === 123) e.preventDefault();
      }, false);
    </script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --brand-green: #5ee083;
        --brand-green-glow: rgba(94, 224, 131, 0.4);
        --bg-dark: #080b09;
        --text-dim: #9ca3af;
        --plyr-color-main: #5ee083;
      }

      html, body {
        width: 100%;
        height: 100%;
        background-color: var(--bg-dark);
        overflow: hidden;
        font-family: 'Rajdhani', sans-serif;
        color: #fff;
      }

      /* ── BACKGROUND GRID ── */
      .bg-grid {
        position: absolute;
        inset: 0;
        background-image: 
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: 0;
        pointer-events: none;
        transform: perspective(500px) rotateX(45deg) scale(2);
        transform-origin: top center;
        opacity: 0.6;
      }

      /* ── SCREENS ── */
      .screen {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        background: radial-gradient(circle at center, #0f1712 0%, var(--bg-dark) 100%);
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      .screen.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* ── LOADER SCREEN ── */
      #loader-screen { z-index: 50; }
      
      .radar-container {
        position: relative;
        width: 120px;
        height: 120px;
        margin-bottom: 24px;
        border-radius: 50%;
        background: radial-gradient(circle at center, rgba(94, 224, 131, 0.1) 0%, transparent 70%);
        box-shadow: 0 0 40px rgba(94, 224, 131, 0.15);
      }
      .radar-svg {
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }
      .radar-sweep {
        transform-origin: 50px 50px;
        animation: spin 2s linear infinite;
      }
      @keyframes spin { 100% { transform: rotate(360deg); } }

      .brand-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 46px;
        letter-spacing: 4px;
        line-height: 1;
        text-shadow: 0 0 20px rgba(94, 224, 131, 0.3);
      }
      .brand-title span { color: var(--brand-green); }
      
      .subtitle {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 6px;
        color: rgba(255, 255, 255, 0.6);
        margin-top: 8px;
        text-transform: uppercase;
      }

      .divider {
        width: 200px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        margin: 24px 0;
      }

      .dots-container {
        display: flex;
        gap: 6px;
        margin-bottom: 12px;
      }
      .dot {
        width: 6px;
        height: 6px;
        background-color: var(--brand-green);
        border-radius: 50%;
        opacity: 0.3;
        box-shadow: 0 0 10px var(--brand-green-glow);
        animation: pulseDot 1.4s infinite ease-in-out both;
      }
      .dot:nth-child(1) { animation-delay: -0.32s; }
      .dot:nth-child(2) { animation-delay: -0.16s; }
      @keyframes pulseDot {
        0%, 80%, 100% { transform: scale(0.8); opacity: 0.3; }
        40% { transform: scale(1.2); opacity: 1; }
      }

      .status-text {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 3px;
        color: rgba(255, 255, 255, 0.5);
        text-transform: uppercase;
      }

      /* ── ERROR SCREEN ── */
      #error-screen {
        z-index: 60;
        background: var(--bg-dark);
      }
      
      .lightning-icon {
        width: 48px;
        height: 48px;
        fill: #dca952;
        margin-bottom: 24px;
        filter: drop-shadow(0 0 15px rgba(220, 169, 82, 0.3));
      }

      .error-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 38px;
        letter-spacing: 3px;
        margin-bottom: 16px;
      }

      .error-desc {
        font-family: 'Courier New', Courier, monospace;
        font-size: 13px;
        color: var(--text-dim);
        text-align: center;
        max-width: 320px;
        line-height: 1.6;
        margin-bottom: 32px;
      }

      .retry-btn {
        background-color: var(--brand-green);
        color: #fff;
        border: none;
        padding: 12px 32px;
        border-radius: 4px;
        font-family: 'Rajdhani', sans-serif;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 15px rgba(94, 224, 131, 0.2);
      }
      .retry-btn:hover {
        transform: translateY(-2px);
        background-color: #4cd373;
        box-shadow: 0 6px 20px rgba(94, 224, 131, 0.35);
      }

      /* ── PLAYER & WATERMARKS ── */
      #player-wrap {
        width: 100%;
        height: 100%;
        position: relative;
        background: #000;
        z-index: 5;
      }
      video { width: 100%; height: 100%; display: block; }
      .plyr { width: 100% !important; height: 100% !important; position: relative; font-weight: 600; }
      .plyr--video, .plyr__video-wrapper { height: 100% !important; }
      .plyr video { height: 100% !important; object-fit: contain; }
      
      /* Watermark Top Left (Join) */
      #join-btn {
        position: absolute;
        top: 15px;
        left: 15px;
        z-index: 102;
        color: rgba(255,255,255,0.7);
        border: 1px solid rgba(255,255,255,0.3);
        padding: 4px 12px;
        border-radius: 4px;
        text-decoration: none;
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 1px;
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(4px);
        transition: all 0.2s;
      }
      #join-btn:hover { color: #fff; border-color: #fff; background: rgba(0,0,0,0.7); }

      /* Watermark Bottom Center */
      #wm {
        position: absolute;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 102;
        pointer-events: none;
        display: flex;
        align-items: center;
        gap: 12px;
        opacity: 0.4;
        transition: opacity 0.4s;
      }
      .plyr--hide-controls #wm { opacity: 0.2; }
      .wm-rule { width: 30px; height: 1px; background: linear-gradient(90deg, transparent, var(--brand-green)); }
      .wm-rule.r { background: linear-gradient(90deg, var(--brand-green), transparent); }
      .wm-inner { display: flex; flex-direction: column; align-items: center; gap: 2px; }
      .wm-name { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 4px; color: #fff; text-shadow: 0 2px 10px #000; }
      .wm-name span { color: var(--brand-green); }
      .wm-url { font-size: 10px; font-weight: 700; letter-spacing: 3px; color: rgba(255,255,255,0.6); text-transform: uppercase; }

      /* iOS Fullscreen override */
      #ios-fs-btn {
        display: none;
        position: absolute;
        bottom: 15px;
        right: 15px;
        z-index: 500;
        background: rgba(0,0,0,0.6);
        border: 1px solid var(--brand-green);
        color: #fff;
        padding: 8px 12px;
        border-radius: 4px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>

    <!-- BACKGROUND GRID -->
    <div class="bg-grid"></div>

    <!-- LOADER SCREEN -->
    <div id="loader-screen" class="screen">
      <div class="radar-container">
        <svg viewBox="0 0 100 100" class="radar-svg">
          <circle cx="50" cy="50" r="48" stroke="rgba(94, 224, 131, 0.15)" stroke-width="1" fill="none" />
          <circle cx="50" cy="50" r="28" stroke="rgba(94, 224, 131, 0.4)" stroke-width="1" fill="none" />
          <circle cx="50" cy="50" r="8" stroke="rgba(94, 224, 131, 0.6)" stroke-width="2" fill="none" />
          <g class="radar-sweep">
            <circle cx="50" cy="22" r="3.5" fill="#fff" filter="drop-shadow(0 0 4px #5ee083)" />
          </g>
        </svg>
      </div>
      <h1 class="brand-title">SPORTS<span>TRACK</span></h1>
      <h2 class="subtitle">LIVE MATCH CENTER</h2>
      <div class="divider"></div>
      <div class="dots-container">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <p class="status-text" id="status-text">CONNECTING TO STREAM...</p>
    </div>

    <!-- ERROR SCREEN -->
    <div id="error-screen" class="screen hidden">
      <svg class="lightning-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" stroke="#dca952" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <h1 class="error-title">STREAM UNAVAILABLE</h1>
      <p class="error-desc" id="error-desc">Player did not load. Check if the stream URL is valid, CORS is allowed, and the .m3u8 is reachable.</p>
      <button class="retry-btn" onclick="location.reload()">RETRY</button>
    </div>

    <!-- PLAYER WRAPPER -->
    <div id="player-wrap">
      <a id="join-btn" href="https://www.whatsapp.com/channel/0029Vb7Jqva5K3zLauUJSv2s" target="_blank">JOIN US</a>
      <button id="ios-fs-btn" onclick="iosFullscreen()">⛶ Fullscreen</button>
      
      <video id="player" controls playsinline webkit-playsinline x5-playsinline x5-video-player-type="h5" x5-video-player-fullscreen="true"></video>
    </div>

    <!-- WATERMARK -->
    <div id="wm">
      <div class="wm-rule"></div>
      <div class="wm-inner">
        <div class="wm-name">SPORTS<span>TRACK</span></div>
        <div class="wm-url">sportstrack.me</div>
      </div>
      <div class="wm-rule r"></div>
    </div>

    <script>
      (function(){
        const params = new URLSearchParams(window.location.search);
        const DIRECT_SRC = params.get('url') || params.get('stream') || params.get('get') || params.get('src') || '';

        const video = document.getElementById('player');
        const loaderScreen = document.getElementById('loader-screen');
        const errorScreen = document.getElementById('error-screen');
        const statusText = document.getElementById('status-text');
        const wm = document.getElementById('wm');
        const iosFsBtn = document.getElementById('ios-fs-btn');

        // Detect iOS & Iframe for Fullscreen fallback
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isInIframe = window.self !== window.top;
        if (isIOS && isInIframe) { iosFsBtn.style.display = 'block'; }

        window.iosFullscreen = function() {
          if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
          else if (video.requestFullscreen) video.requestFullscreen().catch(()=>{});
        };

        // UI Management
        function showLoader(msg) {
          errorScreen.classList.add('hidden');
          loaderScreen.classList.remove('hidden');
          if(msg) statusText.textContent = msg;
        }

        function triggerError(msg) {
          clearTimeout(hardTimeout);
          loaderScreen.classList.add('hidden');
          errorScreen.classList.remove('hidden');
          if (msg) document.getElementById('error-desc').textContent = msg;
          if (hls) { hls.destroy(); hls = null; }
          if (plyr) { plyr.destroy(); plyr = null; }
        }

        function mountWm(){
          const p = document.querySelector('.plyr');
          if (p && !p.contains(wm)) { p.style.position = 'relative'; p.appendChild(wm); }
        }

        function onVideoPlaying() {
          clearTimeout(hardTimeout);
          loaderScreen.classList.add('hidden');
          errorScreen.classList.add('hidden');
          mountWm();
        }

        if (!DIRECT_SRC) {
          triggerError('No stream URL provided. Add ?url=<m3u8-link> to the page URL.');
          return;
        }

        // Hard timeout: If video doesn't play within 15 seconds, show error.
        let hardTimeout = setTimeout(() => {
          triggerError('Connection timed out. Check if the stream URL is valid, CORS is allowed, and the .m3u8 is reachable.');
        }, 15000);

        let hls = null;
        let plyr = null;
        let retryCount = 0;
        const MAX_RETRIES = 3;

        // Auto-landscape handling
        function lockLandscape(){
          try {
            const scr = screen.orientation || screen.msOrientation;
            if (scr && scr.lock) scr.lock('landscape').catch(()=>{});
          } catch(e) {}
        }
        function unlockOrientation(){
          try {
            const scr = screen.orientation || screen.msOrientation;
            if (scr && scr.unlock) scr.unlock();
          } catch(e) {}
        }
        document.addEventListener('fullscreenchange', () => { if (document.fullscreenElement) lockLandscape(); else unlockOrientation(); });
        video.addEventListener('webkitbeginfullscreen', lockLandscape);
        video.addEventListener('webkitendfullscreen', unlockOrientation);
        video.addEventListener('playing', onVideoPlaying);

        // Core Player Setup
        function initPlayer(srcUrl) {
          // Native HLS (iOS Safari)
          if (!Hls.isSupported() && video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = srcUrl;
            plyr = new Plyr(video, { controls: ['play-large','play','progress','current-time','mute','volume','fullscreen'] });
            
            if (isIOS) {
              plyr.on('ready', () => {
                const fsBtn = document.querySelector('.plyr__controls button[data-plyr="fullscreen"]');
                if (fsBtn) fsBtn.addEventListener('click', (e) => { e.stopPropagation(); iosFullscreen(); }, true);
              });
            }
            video.play().catch(()=>{});
            
            video.addEventListener('error', () => triggerError('Native playback failed. The stream might be offline or unsupported.'));
            return;
          }

          if (!Hls.isSupported()) {
            triggerError('Your browser does not support HLS playback.');
            return;
          }

          // HLS.js implementation
          hls = new Hls({
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
            liveSyncDuration: 8,
            liveMaxLatencyDuration: 15,
            enableWorker: true,
            lowLatencyMode: false,
          });

          hls.loadSource(srcUrl);
          hls.attachMedia(video);

          hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
            const qualities = data.levels.map(l => l.height).filter(h => h > 0).sort((a,b)=>b-a);
            const uniqueQualities = [...new Set(qualities)];

            plyr = new Plyr(video, {
              controls: ['play-large','play','progress','current-time','mute','volume', uniqueQualities.length > 1 ? 'settings' : '', 'fullscreen'].filter(Boolean),
              settings: ['quality'],
              quality: {
                default: uniqueQualities[0] || 'default',
                options: uniqueQualities,
                forced: true,
                onChange: q => {
                  const bestIdx = hls.levels.findIndex(l => l.height === q);
                  if (bestIdx !== -1) hls.currentLevel = bestIdx;
                }
              }
            });

            video.play().catch(()=>{});
          });

          // ERROR HANDLING LOGIC (FIXED)
          hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
              switch (data.type) {
                case Hls.ErrorTypes.NETWORK_ERROR:
                  console.warn("Network error encountered.");
                  if (retryCount < MAX_RETRIES) {
                    retryCount++;
                    statusText.textContent = `RECONNECTING... (${retryCount}/${MAX_RETRIES})`;
                    showLoader();
                    hls.startLoad();
                  } else {
                    triggerError('Network Error: Maximum retries reached. The stream is currently offline or unreachable due to CORS.');
                  }
                  break;
                case Hls.ErrorTypes.MEDIA_ERROR:
                  console.warn("Media error encountered, trying to recover.");
                  if (retryCount < MAX_RETRIES) {
                    retryCount++;
                    hls.recoverMediaError();
                  } else {
                    triggerError('Media Error: Stream decoding failed repeatedly.');
                  }
                  break;
                default:
                  triggerError('Stream Error: An unrecoverable error occurred while attempting to parse the manifest.');
                  break;
              }
            }
          });
        }

        // Watermark fading logic
        let wmTimer;
        function resetWm() {
          wm.style.opacity = '0.5';
          clearTimeout(wmTimer);
          wmTimer = setTimeout(() => { if (!video.paused) wm.style.opacity = '0.2'; }, 3000);
        }
        video.addEventListener('play', resetWm);
        video.addEventListener('pause', () => wm.style.opacity = '0.5');
        document.addEventListener('mousemove', resetWm);
        document.addEventListener('touchstart', resetWm);

        // Start 
        initPlayer(DIRECT_SRC);
      })();
    </script>
  </body>
</html>
